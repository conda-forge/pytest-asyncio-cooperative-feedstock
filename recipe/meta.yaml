{% set name = "pytest-asyncio-cooperative" %}
{% set version = "0.39.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5b5282f70cb6d0b2868654e7ca4bdd7ad7a5fd73a35702f22e53bc3d60f26df4

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.7
    - poetry-core >=1.0.0
  run:
    - python >=3.7
    - pytest

test:
  imports:
    - pytest_asyncio_cooperative
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/pytest-asyncio-cooperative/
  summary: Run all your asynchronous tests cooperatively.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MichelML
